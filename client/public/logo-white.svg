<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 175 40" role="img" aria-label="ToBeATraveller">
  <title>ToBeATraveller</title>

  <!-- Mark: no background (used on dark/colored backgrounds) -->
  <circle cx="20" cy="20" r="19" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <path d="M 11 29 Q 20 20 29 11"
        stroke="rgba(255,255,255,0.6)" stroke-width="2" fill="none"
        stroke-dasharray="3 3" stroke-linecap="round"/>
  <circle cx="11" cy="29" r="2.8" fill="rgba(255,255,255,0.6)"/>
  <circle cx="20" cy="20" r="2.2" fill="white"/>
  <circle cx="29" cy="11" r="5.5" fill="white"/>
  <circle cx="29" cy="11" r="2.8" fill="rgba(255,255,255,0.25)"/>

  <!-- Wordmark: white stacked -->
  <text
    x="50"
    y="15"
    font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="10.5"
    font-weight="600"
    letter-spacing="2.8"
    fill="rgba(255,255,255,0.65)"
  >TO BE A</text>
  <text
    x="50"
    y="33"
    font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="17"
    font-weight="800"
    letter-spacing="-0.4"
    fill="white"
  >TRAVELLER</text>
</svg>
